services:
  - type: web
    name: shopease-agent-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # You will paste this manually in Render dashboard
    rootDir: backend
